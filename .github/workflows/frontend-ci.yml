# Frontend CI — validates TypeScript and production build for ShelfTxt.
#
# Linting: `npm run lint` runs `tsc --noEmit` (TypeScript type-check only).
# There is no ESLint/Prettier setup in this project.
#
# Triggers only when frontend files (or this workflow) change.

name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # package.json defines "lint": "tsc --noEmit" — TypeScript check, not ESLint.
      - name: Lint (TypeScript)
        run: npm run lint

      # package.json defines "build": "tsc --noEmit && vite build"
      - name: Build
        run: npm run build
