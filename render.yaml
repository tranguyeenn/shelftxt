# Render Blueprint — Python API (monorepo: run from repo root, not backend/)
services:
  - type: web
    name: shelftxt-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEMO_READ_ONLY
        value: "true"
